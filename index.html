<script>
const data = JSON.parse(document.getElementById('dashboard-data').textContent);
const dayTabs = document.getElementById('day-tabs');
const contentSection = document.getElementById('content-section');
const stockSection = document.getElementById('stock-section');
const catBtns = document.querySelectorAll('.cat-btn');
let activeCat = 'tech';
let activeIndex = 0;

function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00+09:00');
  return dt.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', weekday: 'short' });
}

function renderCatButtons() {
  catBtns.forEach(btn => {
    const isActive = btn.dataset.cat === activeCat;
    btn.className = 'cat-btn px-4 py-2 rounded-full text-sm font-medium border whitespace-nowrap ' +
      (isActive ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50');
  });
  stockSection.classList.toggle('hidden', activeCat !== 'tech');
}

function renderDayTabs() {
  if (activeCat !== 'tech') {
    dayTabs.innerHTML = '';
    dayTabs.classList.add('hidden');
    return;
  }
  dayTabs.classList.remove('hidden');
  const days = data.categories[activeCat].days;
  dayTabs.innerHTML = '';
  days.forEach((day, i) => {
    const btn = document.createElement('button');
    btn.className = 'px-4 py-2 rounded-full text-sm font-medium border ' +
      (i === activeIndex ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50');
    btn.textContent = (i === 0 ? '本日 ' : '') + fmtDate(day.date);
    btn.onclick = () => { activeIndex = i; renderDayTabs(); renderContent(); };
    dayTabs.appendChild(btn);
  });
  if (days.length < 2) {
    const placeholder = document.createElement('span');
    placeholder.className = 'px-4 py-2 rounded-full text-sm text-slate-400 border border-dashed border-slate-200';
    placeholder.textContent = '前日分は明日以降に表示されます';
    dayTabs.appendChild(placeholder);
  }
}

function renderTechNews(day) {
  const n = day.news;
  contentSection.innerHTML = `
    <div class="space-y-5">
      <div>
        <span class="inline-block text-xs font-semibold text-indigo-600 mb-1">■ 1. 本日の大注目トピック</span>
        <h3 class="font-bold text-slate-900">${n.topic1_title}</h3>
        <p class="text-sm text-slate-600 mt-1 leading-relaxed">${n.topic1_body}</p>
        ${n.topic2_title ? `<h3 class="font-bold text-slate-900 mt-3">${n.topic2_title}</h3><p class="text-sm text-slate-600 mt-1 leading-relaxed">${n.topic2_body}</p>` : ''}
      </div>
      <div>
        <span class="inline-block text-xs font-semibold text-indigo-600 mb-1">■ 2. なぜ凄いのか・生活への影響</span>
        <p class="text-sm text-slate-600 leading-relaxed">${n.why_it_matters}</p>
      </div>
      <div>
        <span class="inline-block text-xs font-semibold text-indigo-600 mb-1">■ 3. 日本株へのインパクト（話題の整理）</span>
        <p class="text-sm text-slate-600 leading-relaxed">${n.stock_impact}</p>
      </div>
      <div class="bg-indigo-50 rounded-xl p-4">
        <span class="inline-block text-xs font-semibold text-indigo-600 mb-1">■ 4. 本日のまとめ</span>
        <p class="text-sm text-slate-700 leading-relaxed font-medium">${n.summary}</p>
      </div>
    </div>
  `;
}

function getWatchedCodes() {
  const s = data.stocks;
  const codes = [...s.main, ...s.niche, ...s.etf].map(x => x.code);
  return new Set(codes);
}

function renderEconomy() {
  const econ = data.categories.economy;
  const t = econ.top_traded_stocks;
  const watchedCodes = getWatchedCodes();
  contentSection.innerHTML = `
    <div class="mb-4 flex items-center justify-between">
      <span class="inline-block text-xs font-semibold text-indigo-600">■ 直近1週間の注目ニュース</span>
      <span class="text-xs text-slate-400">${econ.week_range || ''}</span>
    </div>
    <div class="space-y-4 mb-8">
      ${econ.items.map(item => `
        <div class="border-l-4 border-indigo-200 pl-4">
          <div class="text-xs text-slate-400 mb-0.5">${item.date}</div>
          <div class="font-bold text-slate-900 text-sm">${item.headline}</div>
          <p class="text-sm text-slate-600 mt-1 leading-relaxed">${item.summary}</p>
        </div>
      `).join('')}
    </div>
    ${t ? `
    <div class="border-t border-slate-100 pt-5">
      <div class="flex items-center justify-between mb-1">
        <span class="inline-block text-xs font-semibold text-indigo-600">■ 売買代金上位20銘柄（前日比）</span>
        <span class="text-xs text-slate-400">${t.updated_at}</span>
      </div>
      <p class="text-xs text-slate-500 mb-1">${t.note}</p>
      <p class="text-xs text-amber-600 mb-3">⭐ 印はスピントロニクス・IOWNで注目している銘柄です</p>
      <div class="overflow-x-auto">
        <table class="w-full text-sm border-collapse">
          <thead>
            <tr class="text-left text-xs text-slate-400 border-b border-slate-200">
              <th class="py-2 pr-2">順位</th>
              <th class="py-2 pr-2">コード</th>
              <th class="py-2 pr-2">銘柄名</th>
              <th class="py-2 pr-2 text-right">株価</th>
              <th class="py-2 pr-2 text-right">前日比</th>
            </tr>
          </thead>
          <tbody>
            ${t.list.map(s => {
              const up = s.change >= 0;
              const priceStr = s.price >= 1000 ? s.price.toLocaleString('ja-JP') : s.price;
              const watched = watchedCodes.has(s.code);
              const rowClass = watched ? 'border-b border-amber-200 bg-amber-50' : 'border-b border-slate-100';
              return `
                <tr class="${rowClass}">
                  <td class="py-2 pr-2 text-slate-400">${s.rank}</td>
                  <td class="py-2 pr-2 text-slate-400">${s.code}</td>
                  <td class="py-2 pr-2 font-medium text-slate-800 whitespace-nowrap">${watched ? '⭐ ' : ''}${s.name}</td>
                  <td class="py-2 pr-2 text-right font-semibold text-slate-900">${priceStr}円</td>
                  <td class="py-2 pr-2 text-right font-semibold ${up ? 'text-rose-600' : 'text-blue-600'}">${up ? '+' : ''}${s.change} (${up ? '+' : ''}${s.changePct.toFixed(2)}%)</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ` : ''}
  `;
}

function renderBTypeSupport() {
  const b = data.categories.b_type_support;
  const sec = b.sections;
  const order = ['system_changes', 'children_news', 'afterschool_school_news', 'ai_recommendations'];
  contentSection.innerHTML = `
    <div class="mb-4 flex items-center justify-between">
      <span class="inline-block text-xs font-semibold text-indigo-600">■ B型支援 立ち上げ準備メモ</span>
      <span class="text-xs text-slate-400">更新日: ${b.updated_at}</span>
    </div>
    <div class="space-y-8">
      ${order.map(key => `
        <div>
          <h3 class="text-sm font-bold text-slate-900 mb-3 bg-indigo-50 inline-block px-3 py-1 rounded-full">${sec[key].title}</h3>
          <div class="space-y-3 mt-2">
            ${sec[key].items.map(item => `
              <div class="border-l-4 border-slate-200 pl-4">
                <div class="text-xs text-slate-400 mb-0.5">${item.date}</div>
                <div class="font-bold text-slate-900 text-sm">${item.headline}</div>
                <p class="text-sm text-slate-600 mt-1 leading-relaxed">${item.summary}</p>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderContent() {
  if (activeCat === 'tech') {
    const day = data.categories.tech.days[activeIndex];
    renderTechNews(day);
  } else if (activeCat === 'economy') {
    renderEconomy();
  } else if (activeCat === 'b_type_support') {
    renderBTypeSupport();
  }
}

function stockCard(s) {
  const up = s.change >= 0;
  const color = up ? 'text-rose-600 bg-rose-50' : 'text-blue-600 bg-blue-50';
  const arrow = up ? '▲' : '▼';
  const priceStr = s.price >= 1000 ? s.price.toLocaleString('ja-JP') : s.price;
  return `
    <div class="border border-slate-200 rounded-xl p-3 flex flex-col gap-1">
      <div class="flex items-center justify-between">
        <span class="text-xs text-slate-400">${s.code}${s.date ? `<span class="text-[10px] text-slate-300"> (${s.date}時点)</span>` : ''}</span>
        <span class="text-xs px-2 py-0.5 rounded-full font-semibold ${color}">${arrow} ${Math.abs(s.changePct).toFixed(2)}%</span>
      </div>
      <div class="text-sm font-semibold text-slate-800 truncate">${s.name}</div>
      <div class="flex items-baseline gap-2">
        <span class="text-lg font-bold text-slate-900">${priceStr}円</span>
        <span class="text-xs ${up ? 'text-rose-500' : 'text-blue-500'}">${up ? '+' : ''}${s.change}円</span>
      </div>
    </div>
  `;
}

function renderStocks() {
  document.getElementById('stock-updated').textContent = data.stocks.updated_at;
  document.getElementById('stocks-main').innerHTML = data.stocks.main.map(stockCard).join('');
  document.getElementById('stocks-niche').innerHTML = data.stocks.niche.map(stockCard).join('');
  document.getElementById('stocks-etf').innerHTML = data.stocks.etf.map(stockCard).join('');
}

function renderLinks() {
  const links = (data.categories[activeCat] && data.categories[activeCat].links) || [];
  const heading = document.getElementById('links-heading');
  if (heading) heading.textContent = `おすすめリンク集（${data.categories[activeCat].label}）`;
  document.getElementById('links-list').innerHTML = links.map(l => `
    <a href="${l.url}" target="_blank" rel="noopener" class="block border border-slate-200 rounded-xl p-3 hover:bg-slate-50 transition">
      <div class="text-sm font-semibold text-indigo-600">${l.title}</div>
      <div class="text-xs text-slate-500 mt-0.5">${l.desc}</div>
    </a>
  `).join('');
}

catBtns.forEach(btn => {
  btn.onclick = () => {
    activeCat = btn.dataset.cat;
    activeIndex = 0;
    renderCatButtons();
    renderDayTabs();
    renderContent();
    renderLinks();
  };
});

renderCatButtons();
renderDayTabs();
renderContent();
renderStocks();
renderLinks();
</script>

</body>
</html>
